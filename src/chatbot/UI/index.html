<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LúaXanh AI - Trợ Lý Nông Nghiệp</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- Thư viện biểu tượng Lucide -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        :root {
            --bg-body: #fcfdf2;
            --bg-card: #ffffff;
            --text-main: #2d3a1a;
            --border-color: #e2e8d0;
            --chat-bg: rgba(249, 251, 242, 0.4);
            --primary-green: #4a7c2c;
            --ai-bubble-bg: #f1f5e9;
        }

        /* Chế độ tối */
        body.dark {
            --bg-body: #12140e;
            --bg-card: #1e2118;
            --text-main: #f1f5e9; /* Chữ trắng/sáng */
            --border-color: #3d4432;
            --chat-bg: rgba(30, 33, 24, 0.6);
            --primary-green: #68a341;
            --ai-bubble-bg: #252a1c;
        }

        body {
            background-color: var(--bg-body);
            color: var(--text-main);
            transition: background-color 0.3s, color 0.3s;
        }

        .leaf-gradient {
            background: linear-gradient(135deg, #4a7c2c 0%, #3d6624 100%);
        }

        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: var(--border-color);
            border-radius: 10px;
        }

        /* Định dạng nội dung tin nhắn GỌN HƠN */
        .formatted-content b, .formatted-content strong {
            color: var(--primary-green);
            font-weight: 800;
        }
        /* Headers trong markdown */
        .formatted-content h3 {
            font-weight: 800;
            font-size: 0.875rem;
            margin-top: 0.5rem;
            margin-bottom: 0.25rem;
            color: var(--primary-green);
            border-left: 3px solid var(--primary-green);
            padding-left: 0.5rem;
        }
        .formatted-content ul {
            margin-left: 1rem;
            list-style-type: none;
        }
        .formatted-content li {
            position: relative;
            margin-bottom: 0.1rem; 
        }
        .formatted-content li::before {
            content: "•";
            color: var(--primary-green);
            font-weight: bold;
            display: inline-block; 
            width: 1em;
            margin-left: -1em;
        }

        /* Thu hẹp khoảng cách văn bản chung */
        .whitespace-pre-wrap {
            white-space: pre-wrap;
            word-wrap: break-word;
            line-height: 1.35; 
        }

        /* Tay nắm kéo size khung chat */
        #chatResizeHandle {
            position: absolute;
            top: 0;
            left: 0;
            width: 24px;
            height: 24px;
            cursor: nw-resize;
            z-index: 60;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #chatResizeHandle::after {
            content: "";
            width: 8px;
            height: 8px;
            border-top: 2px solid rgba(255,255,255,0.6);
            border-left: 2px solid rgba(255,255,255,0.6);
        }

        #chatWindow {
            box-shadow: 0 10px 40px -10px rgba(0,0,0,0.5);
            background-color: var(--bg-card);
            border-color: var(--border-color);
            min-width: 300px;
            min-height: 400px;
            max-width: 95vw;
            max-height: 85vh;
        }

        .bg-custom-card { background-color: var(--bg-card); border-color: var(--border-color); }
        
        /* Hiệu ứng chấm nhảy chờ tin nhắn */
        .dot-bounce {
            animation: dotBounce 1.4s infinite ease-in-out both;
        }
        .dot-bounce:nth-child(1) { animation-delay: -0.32s; }
        .dot-bounce:nth-child(2) { animation-delay: -0.16s; }
        @keyframes dotBounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1.0); }
        }
    </style>
</head>
<body class="min-h-screen flex flex-col font-sans transition-colors duration-300">

    <!-- Header -->
    <header class="leaf-gradient text-white p-4 shadow-md sticky top-0 z-30 flex items-center justify-between">
        <div class="flex items-center gap-2">
            <div class="bg-white p-1.5 rounded-full shadow-sm">
                <i data-lucide="leaf" class="text-[#4a7c2c] w-6 h-6"></i>
            </div>
            <h1 class="text-xl font-bold tracking-tight uppercase">LúaXanh AI</h1>
        </div>
        
        <div class="flex items-center gap-4">
            <div class="hidden sm:block text-xs text-green-100 italic">Nhận diện bệnh lúa thông minh</div>
            <!-- Nút Dark Mode -->
            <button id="darkModeToggle" class="p-2 bg-white/10 rounded-lg hover:bg-white/20 transition-all">
                <i data-lucide="moon" id="moonIcon" class="w-5 h-5"></i>
                <i data-lucide="sun" id="sunIcon" class="hidden w-5 h-5"></i>
            </button>
        </div>
    </header>

    <!-- Vùng chính: Chẩn đoán bệnh -->
    <main class="flex-1 max-w-4xl mx-auto w-full p-4 md:p-8">
        <section class="bg-custom-card rounded-3xl shadow-lg border overflow-hidden flex flex-col">
            <div class="bg-emerald-500/10 px-6 py-4 border-b border-inherit flex items-center justify-between">
                <div class="flex items-center gap-2 font-bold text-[#4a7c2c]">
                    <i data-lucide="camera" class="w-6 h-6"></i>
                    <h2 class="text-lg uppercase tracking-wide">PHÂN LOẠI bệnh lá lúa</h2>
                </div>
                <button id="btnReset" class="text-xs flex items-center gap-1 text-gray-400 hover:text-[#4a7c2c] transition-colors">
                    <i data-lucide="refresh-ccw" class="w-3 h-3"></i> Làm mới
                </button>
            </div>
            
            <div class="p-6 flex flex-col gap-6">
                <!-- Vùng chọn ảnh -->
                <div id="dropZone" class="w-full aspect-video md:aspect-[2/1] border-2 border-dashed border-[#a8b88d] rounded-2xl flex flex-col items-center justify-center gap-4 bg-emerald-500/5 hover:bg-emerald-500/10 cursor-pointer transition-all group overflow-hidden relative">
                    <div id="uploadUI" class="flex flex-col items-center gap-3 text-center">
                        <div class="bg-custom-card p-5 rounded-full shadow-md group-hover:scale-110 transition-transform">
                            <i data-lucide="image-plus" class="text-[#4a7c2c] w-10 h-10"></i>
                        </div>
                        <p class="font-bold text-[#4a7c2c]">Chọn ảnh lá lúa</p>
                    </div>
                    <img id="previewImg" class="hidden w-full h-full object-contain bg-black/5" alt="Ảnh đang soi">
                </div>
                
                <input type="file" id="fileInput" accept="image/*" class="hidden">

                <div id="actionArea" class="hidden">
                    <button id="btnAnalyze" class="w-full bg-[#4a7c2c] text-white py-4 rounded-2xl font-bold text-lg shadow-xl hover:bg-[#3d6624] active:scale-[0.98] transition-all flex items-center justify-center gap-2">
                        XEM KẾT QUẢ NGAY <i data-lucide="search" class="w-5 h-5"></i>
                    </button>
                </div>

                <div id="loadingUI" class="hidden py-10 flex flex-col items-center gap-3">
                    <div class="w-12 h-12 border-4 border-emerald-200 border-t-[#4a7c2c] rounded-full animate-spin"></div>
                    <p class="font-bold text-[#4a7c2c]">AI đang phân tích...</p>
                </div>

                <div id="resultArea" class="hidden">
                    <div id="diagnosisContent" class="w-full"></div>
                </div>
            </div>
        </section>
    </main>

    <!-- Nút Chat tròn -->
    <button id="chatToggle" class="fixed bottom-6 right-6 w-14 h-14 bg-[#4a7c2c] text-white rounded-full shadow-2xl flex items-center justify-center hover:scale-110 active:scale-95 transition-all z-50">
        <i data-lucide="message-circle" id="chatIconOpen" class="w-7 h-7"></i>
        <i data-lucide="x" id="chatIconClose" class="hidden w-7 h-7"></i>
    </button>

    <!-- Cửa sổ Chatbot (Có RESIZE) -->
    <section id="chatWindow" class="hidden fixed bottom-24 right-6 w-[350px] md:w-[500px] h-[550px] bg-white rounded-2xl border flex flex-col z-50 animate-in slide-in-from-bottom-10 duration-300">
        <!-- Resize Handle -->
        <div id="chatResizeHandle"></div>

        <div class="leaf-gradient px-4 py-4 text-white flex items-center justify-between select-none">
            <div class="flex items-center gap-2">
                <i data-lucide="bot" class="w-6 h-6"></i>
                <h2 class="font-bold text-sm uppercase tracking-wider">Trợ lý LúaXanh</h2>
            </div>
        </div>

        <div id="chatMessages" class="chat-container flex-1 overflow-y-auto p-4 space-y-2 bg-[var(--chat-bg)]">
            <div class="flex justify-start">
                <div class="max-w-[85%] bg-[var(--ai-bubble-bg)] border border-inherit text-[var(--text-main)] rounded-2xl rounded-tl-none px-4 py-2 shadow-sm text-sm leading-snug">
                    Chào bà con! Tôi có thể giúp gì cho bà con về sâu bệnh lúa ạ?
                </div>
            </div>
        </div>

        <div class="p-3 bg-custom-card border-t border-inherit">
            <div class="flex items-end gap-2 px-1">
                <button id="btnChatFile" class="p-2.5 text-[#4a7c2c] bg-emerald-500/10 rounded-xl hover:bg-emerald-500/20 transition-colors shrink-0">
                    <i data-lucide="image" class="w-6 h-6"></i>
                </button>
                <input type="file" id="chatFileInput" accept="image/*" class="hidden">
                <div class="flex-1">
                    <!-- SỬA LỖI CHỮ NHẬP: Sử dụng CSS variable để tự đổi màu theo mode -->
                    <textarea id="chatInput" rows="1" placeholder="Nhắn gì đó..." class="w-full bg-emerald-500/5 border border-inherit rounded-xl px-3 py-3 text-sm focus:outline-none focus:border-[#4a7c2c] resize-none text-[var(--text-main)]"></textarea>
                </div>
                <button id="btnSend" class="p-2.5 bg-[#4a7c2c] text-white rounded-xl shadow-md hover:bg-[#3d6624] disabled:bg-gray-300 transition-all shrink-0">
                    <i data-lucide="send" class="w-6 h-6"></i>
                </button>
            </div>
        </div>
    </section>

    <script>
        lucide.createIcons();

        // --- KHAI BÁO BIẾN ---
        const body = document.body;
        const darkModeToggle = document.getElementById('darkModeToggle');
        const chatWindow = document.getElementById('chatWindow');
        const resizeHandle = document.getElementById('chatResizeHandle');

        // --- DARK MODE LOGIC ---
        darkModeToggle.addEventListener('click', () => {
            body.classList.toggle('dark');
            const isDark = body.classList.contains('dark');
            document.getElementById('moonIcon').classList.toggle('hidden', isDark);
            document.getElementById('sunIcon').classList.toggle('hidden', !isDark);
        });

        // --- RESIZE CHAT LOGIC ---
        let isResizing = false;
        resizeHandle.addEventListener('mousedown', (e) => {
            isResizing = true;
            document.addEventListener('mousemove', handleMouseMove);
            document.addEventListener('mouseup', () => isResizing = false);
            e.preventDefault();
        });

        function handleMouseMove(e) {
            if (!isResizing) return;
            const rect = chatWindow.getBoundingClientRect();
            const newWidth = rect.right - e.clientX;
            const newHeight = rect.bottom - e.clientY;
            if (newWidth > 300) chatWindow.style.width = newWidth + 'px';
            if (newHeight > 400) chatWindow.style.height = newHeight + 'px';
        }

        const fileInput = document.getElementById('fileInput');
        const dropZone = document.getElementById('dropZone');
        const uploadUI = document.getElementById('uploadUI');
        const previewImg = document.getElementById('previewImg');
        const actionArea = document.getElementById('actionArea');
        const loadingUI = document.getElementById('loadingUI');
        const resultArea = document.getElementById('resultArea');
        const diagnosisContent = document.getElementById('diagnosisContent');
        const btnAnalyze = document.getElementById('btnAnalyze');
        const btnReset = document.getElementById('btnReset');

        const chatToggle = document.getElementById('chatToggle');
        const chatInput = document.getElementById('chatInput');
        const chatMessages = document.getElementById('chatMessages');
        const btnSend = document.getElementById('btnSend');
        const chatFileInput = document.getElementById('chatFileInput');
        const btnChatFile = document.getElementById('btnChatFile');

        const PYTHON_API_URL = "http://127.0.0.1:5000/chat";

        chatToggle.addEventListener('click', () => {
            chatWindow.classList.toggle('hidden');
            document.getElementById('chatIconOpen').classList.toggle('hidden');
            document.getElementById('chatIconClose').classList.toggle('hidden');
        });

        function formatMessageContent(text) {
            if (!text) return "";
            let formatted = text
                // Xử lý tiêu đề ###
                .replace(/^### (.*$)/gm, '<h3>$1</h3>')
                .replace(/^## (.*$)/gm, '<h3 class="text-base">$1</h3>')
                .replace(/-{3,}/g, '<hr class="my-1 border-inherit opacity-20">')
                .replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>')
                .replace(/\*(.*?)\*/g, '<em>$1</em>')
                .replace(/^[\s]*[-*>] (.*)/gm, '<li>$1</li>');
            if (formatted.includes('<li>')) {
                formatted = formatted.replace(/(<li>.*<\/li>)/gms, '<ul class="my-1">$1</ul>');
            }
            return formatted;
        }

        // BIẾN QUẢN LÝ TIMER
        let waitTimerInterval;

        // HÀM HIỆN HIỆU ỨNG CHỜ (TYPING INDICATOR)
        function showTypingIndicator() {
            const startTime = Date.now();
            const div = document.createElement("div");
            div.id = "typingIndicator";
            div.className = "flex justify-start mb-2 animate-in fade-in duration-200 items-end gap-2";
            div.innerHTML = `
                <div class="bg-[var(--ai-bubble-bg)] border border-inherit px-4 py-2 rounded-2xl rounded-tl-none shadow-sm flex gap-1 items-center">
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot-bounce"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot-bounce"></div>
                    <div class="w-1.5 h-1.5 bg-gray-400 rounded-full dot-bounce"></div>
                </div>
                <span id="waitClock" class="text-[10px] text-gray-400 italic mb-1">0s</span>
            `;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;

            // Chạy đồng hồ đếm
            waitTimerInterval = setInterval(() => {
                const elapsed = Math.floor((Date.now() - startTime) / 1000);
                const clock = document.getElementById('waitClock');
                if (clock) clock.innerText = elapsed + 's';
            }, 1000);
        }

        function removeTypingIndicator() {
            const el = document.getElementById("typingIndicator");
            if (el) el.remove();
            clearInterval(waitTimerInterval);
        }

        function appendMessage(role, content, isImage = false) {
            const div = document.createElement("div");
            div.className = `flex ${role === "user" ? "justify-end" : "justify-start"} mb-2 animate-in fade-in slide-in-from-bottom-1 duration-200`;

            let bubbleClass = role === "user" 
                ? "bg-[#4a7c2c] text-white rounded-tr-none" 
                : "bg-[var(--ai-bubble-bg)] border border-inherit text-[var(--text-main)] rounded-tl-none shadow-sm";

            let messageHtml = `<div class="max-w-[85%] rounded-2xl px-4 py-2 text-sm leading-snug ${bubbleClass}">`;

            if (isImage) {
                messageHtml += `<img src="${content}" class="w-full rounded-lg mb-1 max-h-48 object-cover shadow-sm" />`;
            } else {
                const displayContent = role === "assistant" ? formatMessageContent(content) : content;
                messageHtml += `<div class="formatted-content whitespace-pre-wrap">${displayContent}</div>`;
            }
            
            messageHtml += `</div>`;
            div.innerHTML = messageHtml;
            chatMessages.appendChild(div);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        function parsePythonResponse(text) {
            if (!text || typeof text !== 'string') return null;
            const lines = text.split('\n').map(l => l.trim()).filter(l => l !== "");
            const mainMatch = lines[0].match(/Dự đoán bệnh\s*:\s*(.+)\s*\((\d+\.?\d*)%\)/i);
            if (!mainMatch) return null;
            const label = mainMatch[1].trim();
            const confidence = mainMatch[2];
            const others = [];
            for (let i = 1; i < lines.length; i++) {
                const otherMatch = lines[i].match(/(.+)\s*:\s*(\d+\.?\d*)%/);
                if (otherMatch && otherMatch[1].trim() !== label && !otherMatch[1].includes("---")) {
                    others.push({ label: otherMatch[1].trim(), confidence: otherMatch[2] });
                }
            }
            return { label, confidence, others };
        }

        async function sendToPython(text) {
            try {
                if (text.startsWith("image:")) {
                    loadingUI.classList.remove('hidden');
                    actionArea.classList.add('hidden');
                    resultArea.classList.add('hidden');
                }
                
                showTypingIndicator();

                const response = await fetch(PYTHON_API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                
                removeTypingIndicator();

                appendMessage("assistant", data.reply);
                const prediction = parsePythonResponse(data.reply);
                if (prediction) {
                    renderDiagnosisResults(prediction);
                    loadingUI.classList.add('hidden');
                    actionArea.classList.remove('hidden');
                }
            } catch (err) {
                removeTypingIndicator();
                appendMessage("assistant", "Lỗi, câu hỏi ngoài lề..");
                loadingUI.classList.add('hidden');
                actionArea.classList.remove('hidden');
            }
        }

        function renderDiagnosisResults(predictionData) {
            const { label, confidence, others } = predictionData;
            let html = `
                <div class="flex flex-col gap-4 animate-in fade-in slide-in-from-bottom-2 duration-500">
                    <div class="bg-gradient-to-r from-[#4a7c2c] to-[#3d6624] p-6 rounded-2xl text-white shadow-lg flex flex-col sm:flex-row justify-between items-center gap-4">
                        <div class="text-center sm:text-left">
                            <p class="text-green-100 text-[10px] font-bold uppercase tracking-widest mb-1">Dự đoán cao nhất</p>
                            <h3 class="text-4xl font-black">${label}</h3>
                        </div>
                        <div class="bg-white/20 backdrop-blur-md px-6 py-3 rounded-2xl border border-white/30 text-center">
                            <span class="block text-[10px] font-bold text-green-100 uppercase mb-1">Độ tin cậy</span>
                            <span class="text-4xl font-black">${confidence}%</span>
                        </div>
                    </div>
                    ${others.length > 0 ? `
                        <div class="bg-emerald-500/5 border border-inherit rounded-2xl p-4">
                            <p class="text-[9px] font-bold text-gray-400 uppercase tracking-widest mb-2 px-1">Các khả năng khác</p>
                            <div class="space-y-1">
                                ${others.map(item => `
                                    <div class="flex justify-between items-center px-2 py-0.5 border-b border-inherit/30 last:border-0">
                                        <span class="text-sm font-semibold opacity-80">${item.label}</span>
                                        <span class="text-sm font-bold text-[#4a7c2c]">${item.confidence}%</span>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                    ` : ''}
                </div>
            `;
            diagnosisContent.innerHTML = html;
            resultArea.classList.remove('hidden');
            lucide.createIcons();
        }

        dropZone.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = function(event) {
                    uploadUI.classList.add('hidden');
                    previewImg.src = event.target.result;
                    previewImg.classList.remove('hidden');
                    actionArea.classList.remove('hidden');
                    appendMessage("user", event.target.result, true);
                    sendToPython(`image:${file.name}`);
                };
                reader.readAsDataURL(file);
            }
        });

        btnReset.addEventListener('click', () => {
            previewImg.classList.add('hidden');
            uploadUI.classList.remove('hidden');
            actionArea.classList.add('hidden');
            resultArea.classList.add('hidden');
            fileInput.value = '';
            diagnosisContent.innerHTML = '';
        });

        btnSend.addEventListener('click', async () => {
            const text = chatInput.value.trim();
            if (!text) return;
            if (!text.toLowerCase().endsWith('.jpg') && !text.toLowerCase().endsWith('.png')) {
                appendMessage("user", text);
            }
            chatInput.value = "";
            chatInput.style.height = "auto";
            await sendToPython(text);
        } );

        chatInput.addEventListener('keydown', (e) => { if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); btnSend.click(); } });
        btnChatFile.addEventListener('click', () => chatFileInput.click());
        chatFileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (event) => {
                    appendMessage("user", event.target.result, true);
                    sendToPython(`image:${file.name}`);
                };
                reader.readAsDataURL(file);
            }
        });
        chatInput.addEventListener('input', function() { this.style.height = 'auto'; this.style.height = (this.scrollHeight) + 'px'; });
    </script>
</body>
</html>
